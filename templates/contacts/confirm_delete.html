{% extends 'base.html' %}
{% block title %}Remove Contact{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card text-center">
      <div class="card-body py-5">
        <i class="fas fa-trash fa-3x text-danger mb-3"></i>
        <h5>Remove {{ contact.name }}?</h5>
        <p class="text-muted">This contact will no longer receive SOS alerts.</p>
        <form method="post" class="d-flex justify-content-center gap-3 mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">Yes, Remove</button>
          <a href="{% url 'contacts:list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
