{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-7">
    <div class="card shadow-lg">
      <div class="card-header text-center py-4" style="background:linear-gradient(135deg,#7b2d8b,#e91e8c)">
        <h3 class="text-white mb-0"><i class="fas fa-shield-heart me-2"></i>Join SafeHer</h3>
        <p class="text-white-50 mb-0 small">Create your safety account</p>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="row">
            {% for field in form %}
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
          </div>
          <button type="submit" class="btn btn-pink w-100 py-2 fw-bold">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
        </form>
        <div class="text-center mt-3">
          <small>Already registered? <a href="{% url 'accounts:login' %}" style="color:var(--pink)">Login here</a></small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
