{% extends 'base.html' %}
{% block title %}Resolve Alert{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card text-center">
      <div class="card-body py-5">
        <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
        <h5>Mark Alert as Resolved?</h5>
        <p class="text-muted">This will notify your contacts that you are safe.</p>
        <p class="small text-muted">Triggered: {{ alert.triggered_at|date:"d M Y, h:i A" }}</p>
        <form method="post" class="d-flex justify-content-center gap-3 mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-success px-4 fw-bold">
            <i class="fas fa-check me-1"></i>Yes, I'm Safe
          </button>
          <a href="{% url 'dashboard:home' %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
