version: '3.9'

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: safeher_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: safeher_db
      POSTGRES_USER: safeher_user
      POSTGRES_PASSWORD: safeher_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safeher_user -d safeher_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Web App ─────────────────────────────────────────────────────────
  web:
    build: .
    container_name: safeher_web
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgres://safeher_user:safeher_pass@db:5432/safeher_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_files:/app/media

volumes:
  postgres_data:
  media_files:
