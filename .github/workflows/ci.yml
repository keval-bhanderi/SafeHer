name: SafeHer CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: safeher_test_db
          POSTGRES_USER: safeher_user
          POSTGRES_PASSWORD: safeher_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DATABASE_URL: postgres://safeher_user:safeher_pass@localhost:5432/safeher_test_db
      EMAIL_HOST_USER: test@example.com
      EMAIL_HOST_PASSWORD: testpassword
      FAST2SMS_API_KEY: your-fast2sms-api-key
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary coverage

      - name: Run migrations
        run: python manage.py migrate

      - name: Load fixtures
        run: python manage.py loaddata helpline/fixtures/helplines.json

      - name: Check Django configuration
        run: python manage.py check

      - name: Run tests with coverage
        run: |
          coverage run --source='.' manage.py test --verbosity=2
          coverage report --fail-under=60
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8 lint check
        run: |
          flake8 . \
            --exclude=migrations,__pycache__,staticfiles,venv,.git \
            --max-line-length=120 \
            --ignore=E501,W503,E302,W292,E303 \
            --count

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg SECRET_KEY=ci-build-check-key \
            -t safeher:ci-test .
